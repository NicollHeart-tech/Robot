<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOOI OS ULTRA - v6.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <div id="tela-login">
        <div class="glass-box">
            <h1 class="neon-text">LOOI CORE</h1>
            <input type="password" id="senhaInput" placeholder="Chave de Acesso">
            <button onclick="verificarSenha()" class="btn-glow">AUTENTICAR</button>
        </div>
    </div>

    <div id="conteudo-robo" style="display:none;">
        
        <button id="exit-fullscreen-btn" onclick="toggleFullScreen()">❌</button>
        <button id="mic-fullscreen" onclick="ativarVoz()">🎤</button>
        <button id="confirmar-voz-fs" onclick="confirmarEnvio()">ENVIAR AGORA</button>

        <div class="hud-lateral">
            <div class="stat-item">SYS <div class="bar"><div id="cpu-bar" class="fill"></div></div></div>
            <div class="stat-item">LINK <div class="bar"><div id="mem-bar" class="fill"></div></div></div>
        </div>

        <div class="face-wrapper" id="pet-area">
            <div id="looi-face" class="face neutral">
                <div class="eyes">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                </div>
                <div class="mouth-container">
                    <div class="m-bar b1"></div>
                    <div class="m-bar b2"></div>
                    <div class="m-bar b3"></div>
                </div>
            </div>
        </div>

        <div class="bottom-interface">
            <div class="chat-container">
                <input type="text" id="inputTexto" placeholder="Aguardando comando...">
                <div class="btns-group">
                    <button id="btnEnviar">➤</button>
                    <button id="btnConfirmar" style="display:none; color:#00ff00;" onclick="confirmarEnvio()">✔️</button>
                    <button onclick="ativarVoz()">🎤</button>
                    <button onclick="toggleFullScreen()">📺</button>
                    <button onclick="toggleMenu()">⚙️</button>
                </div>
            </div>
        </div>

        <div id="menu-config" class="config-popup">
            <h3>PAINEL</h3>
            <input type="text" id="configUrl" placeholder="Link LocalTunnel">
            <button onclick="salvarConfig()">SALVAR</button>
        </div>
    </div>

    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>
    <script src="script.js"></script>
</body>
</html>
