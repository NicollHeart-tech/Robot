<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOOI OS ULTRA - v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <div id="tela-login">
        <div class="glass-box">
            <h1 class="neon-text">LOOI CORE</h1>
            <p>SISTEMA DE SEGURANÇA ATIVO</p>
            <input type="password" id="senhaInput" placeholder="Chave de Acesso">
            <button onclick="verificarSenha()" class="btn-glow">AUTENTICAR</button>
            <p id="erroMsg" style="display:none; color: #ff3300; margin-top: 10px;">ACESSO NEGADO!</p>
        </div>
    </div>

    <div id="conteudo-robo" style="display:none;">
        
        <div class="hud-lateral">
            <div class="stat-item">
                <span>CPU PROCESS</span>
                <div class="bar"><div id="cpu-bar" class="fill"></div></div>
            </div>
            <div class="stat-item">
                <span>NEURAL LINK</span>
                <div class="bar"><div id="mem-bar" class="fill"></div></div>
            </div>
            <div class="stat-item">
                <span class="label">MOOD:</span>
                <span id="status-mood" class="neon-blue">STABLE</span>
            </div>
        </div>

        <div class="face-wrapper" id="pet-area">
            <div id="looi-face" class="face neutral">
                <div class="eyes">
                    <div class="eye left"><div class="pupil"></div></div>
                    <div class="eye right"><div class="pupil"></div></div>
                </div>
                <div class="mouth-box">
                    <div class="mouth" id="looi-mouth"></div>
                </div>
            </div>
        </div>

        <div class="bottom-interface">
            <div class="chat-container">
                <input type="text" id="inputTexto" placeholder="Escreva ou use o microfone...">
                <div class="btns-group">
                    <button id="btnEnviar" title="Enviar">➤</button>
                    <button id="btnVoz" title="Falar">🎤</button>
                    <button id="btnFullscreen" onclick="toggleFullScreen()" title="Tela Cheia">📺</button>
                    <button id="btnConfig" onclick="toggleMenu()" title="Configurações">⚙️</button>
                </div>
            </div>
        </div>

        <div id="menu-config" class="config-popup">
            <h3>PAINEL DE CONTROLE</h3>
            <p>URL do Servidor (LocalTunnel):</p>
            <input type="text" id="configUrl" placeholder="https://exemplo.loca.lt">
            <button onclick="salvarConfig()" class="btn-save">ATUALIZAR LINK</button>
            <button onclick="toggleMenu()" class="btn-close">FECHAR</button>
        </div>
    </div>

    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>

    <script src="script.js"></script>
</body>
</html>
