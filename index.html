<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOOI OS - Protegido</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="tela-login">
        <div class="login-box">
            <h1 class="titulo-seguranca">SISTEMA BLOQUEADO</h1>
            <p style="color:#aaa;">Insira a chave de acesso</p>
            <input type="password" id="senhaInput" placeholder="••••••"
                   onkeydown="if(event.key==='Enter') verificarSenha()">
            <button onclick="verificarSenha()" id="btnAcessar">DESBLOQUEAR</button>
            <p id="erroMsg" style="display:none; color:#ff3300; margin-top:10px;">⚠ CHAVE INCORRETA!</p>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div id="conteudo-robo" style="display:none; flex-direction:column; align-items:center;">

        <!-- Botão fullscreen -->
        <button id="btnFullscreen" title="Tela cheia">⛶</button>

        <!-- Rosto da LOOI -->
        <div id="looi-face" class="face neutro">
            <div class="eyes">
                <div class="eye left"></div>
                <div class="eye right"></div>
            </div>
            <div class="mouth" id="looi-mouth"></div>
        </div>

        <!-- HUD de controle -->
        <div class="hud">
            <input type="text" id="inputTexto" placeholder="Fale comigo...">
            <button id="btnEnviar" title="Enviar">➤</button>
            <button id="btnVoz"    title="Microfone">🎤</button>
        </div>
    </div>

    <!-- Câmera oculta -->
    <video  id="video"  autoplay playsinline style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>

    <script src="script.js"></script>
</body>
</html>
